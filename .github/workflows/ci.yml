name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: swift build -c release
      - run: swift test
      # Smoke: the CLI path must never touch AppKit (no window flash, clean exit).
      - run: .build/release/labelkit --version
      # Smoke: `detect` is wired and stays headless (no AppKit). We don't run a
      # detector here — Vision is unstable on the macOS 14 runner (see
      # skipIfCI) — so we assert the AppKit-free paths: help prints, and the
      # missing-file path validates and exits 64 before any Vision call.
      - name: Smoke-test `labelkit detect` stays headless
        run: |
          .build/release/labelkit detect --help >/dev/null
          if .build/release/labelkit detect /nonexistent.jpg --detector rectangles; then
            echo "expected a usage error"; exit 1
          else
            test $? -eq 64
          fi
