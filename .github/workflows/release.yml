name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
      - run: swift test
      - name: Build universal binary + app bundle
        run: ./scripts/package-app.sh --universal
      - name: Archive (universal + thin per-arch)
        run: |
          cd .build/release
          # Universal: the fallback + manual-download artifact.
          tar -czf "labelkit-${GITHUB_REF_NAME}-universal.tar.gz" labelkit labelkit.app
          # Thin slices: half the size; brew serves these via on_arm/on_intel.
          for arch in arm64 x86_64; do
            mkdir -p "thin-$arch"
            lipo labelkit -thin "$arch" -output "thin-$arch/labelkit"
            cp -R labelkit.app "thin-$arch/labelkit.app"
            lipo labelkit -thin "$arch" -output "thin-$arch/labelkit.app/Contents/MacOS/labelkit"
            codesign --force --sign - "thin-$arch/labelkit.app"
            tar -czf "labelkit-${GITHUB_REF_NAME}-${arch}.tar.gz" -C "thin-$arch" labelkit labelkit.app
          done
          shasum -a 256 labelkit-*.tar.gz | tee checksums.txt
          # Version-less aliases so the README can link
          # releases/latest/download/labelkit-<arch>.tar.gz without hardcoding a
          # version. Copied after checksums.txt so it stays version-scoped (the
          # Homebrew tap reads the versioned names); the upload glob picks these up.
          for arch in universal arm64 x86_64; do
            cp "labelkit-${GITHUB_REF_NAME}-${arch}.tar.gz" "labelkit-${arch}.tar.gz"
          done
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            .build/release/labelkit-*.tar.gz \
            .build/release/checksums.txt \
            --generate-notes
