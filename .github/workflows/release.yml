name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/cache@v4
        with:
          path: .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
      - run: swift test
      - name: Build universal binary + app bundle
        run: ./scripts/package-app.sh --universal
      - name: Archive
        run: |
          cd .build/release
          tar -czf "labelkit-${GITHUB_REF_NAME}-macos.tar.gz" labelkit labelkit.app
          shasum -a 256 labelkit-*-macos.tar.gz | tee checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ".build/release/labelkit-${GITHUB_REF_NAME}-macos.tar.gz" \
            .build/release/checksums.txt \
            --generate-notes
